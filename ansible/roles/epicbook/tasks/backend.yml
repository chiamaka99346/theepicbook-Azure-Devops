---
- name: Create app directory
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  become: yes

- name: Clone EpicBook repository
  git:
    repo: "{{ app_repo_url }}"
    dest: "{{ app_dir }}"
    version: main
    force: yes
  become: no

- name: Deploy app config file
  template:
    src: backend.env.j2
    dest: "{{ app_dir }}/config/config.json"
    mode: "0644"
  become: no

- name: Install app dependencies
  npm:
    path: "{{ app_dir }}"
    state: present
  become: no

- name: Stop existing PM2 process if running
  shell: pm2 delete epicbook-backend || true
  become: no
  ignore_errors: yes

- name: Start app with PM2
  shell: |
    cd {{ app_dir }}
    pm2 start server.js --name epicbook-backend
    pm2 save
  become: no

- name: Enable PM2 startup on boot
  shell: |
    pm2 startup systemd -u {{ ansible_user }} --hp /home/{{ ansible_user }}
    pm2 save
  become: yes

- name: Wait for app to be ready
  wait_for:
    host: localhost
    port: "{{ app_port }}"
    timeout: 60
    state: started