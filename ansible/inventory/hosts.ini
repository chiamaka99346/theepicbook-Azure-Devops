[frontend]
frontend-vm ansible_host=FRONTEND_IP_PLACEHOLDER ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/id_rsa_epicbook

[backend]
backend-vm ansible_host=BACKEND_IP_PLACEHOLDER ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/id_rsa_epicbook

[all:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
